<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} - Gestão de Pessoas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header>
        <nav>
            <a href="{{ url_for('pessoa_bp.listar') }}" class="logo">Sistema Registros</a>
            <ul>
                <li><a href="{{ url_for('pessoa_bp.listar') }}">Listar</a></li>
                <li><a href="{{ url_for('pessoa_bp.novo') }}">Adicionar</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <!-- Mensagens Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block conteudo %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2025 - Rede de Combate ao Câncer</p>
    </footer>
</body>

</html>
