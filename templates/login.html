{% extends "base.html" %}

{% block conteudo %}
<div class="login-container">
    <div class="login-box form-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-user-lock" style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 1rem;"></i>
            <h2>Acesso ao Sistema</h2>
            <p style="color: var(--text-muted);">Insira suas credenciais para continuar</p>
            <small>Dica: Use <b>admin</b> e <b>senha123</b></small>
        </div>

        <form action="{{ url_for('auth_bp.login') }}" method="post">
            <div class="form-group full-width" style="margin-bottom: 1rem;">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
            </div>
            
            <div class="form-group full-width" style="margin-bottom: 1.5rem;">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="Digite sua senha">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
