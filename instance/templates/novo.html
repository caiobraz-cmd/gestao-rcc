{% extends "base.html" %}
{% block conteudo %}
    <h2>Cadastrar Novo Paciente</h2>
    
    <form action="{{ url_for('pessoa_bp.novo') }}" method="post" class="form-card">
        
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
        </div> 
        <div class="form-group">
            <label for="idade">Idade</label>
            <input type="number" id="idade" name="idade" required>
        </div> 
        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
        </div>
        <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco">
        </div>

        <hr>

        <div class="form-group">
            <label for="diagnostico">Diagnóstico</label>
            <textarea id="diagnostico" name="diagnostico" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="tratamentos">Tratamentos</label>
            <textarea id="tratamentos" name="tratamentos" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="medicamentos">Medicamentos</label>
            <textarea id="medicamentos" name="medicamentos" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="alergias">Alergias</label>
            <textarea id="alergias" name="alergias" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="historico_medico">Histórico Médico</label>
            <textarea id="historico_medico" name="historico_medico" rows="6"></textarea>
        </div>
        <div class="form-group">
            <label for="observacoes">Observações</label>
            <textarea id="observacoes" name="observacoes" rows="6"></textarea>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('pessoa_bp.listar') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar Paciente</button>
        </div>
    </form>
{% endblock %}
