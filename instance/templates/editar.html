{% extends "base.html" %}
{% block conteudo %}
    <h2>Editando: {{ pessoa.nome }}</h2>
    <form action="{{ url_for('pessoa_bp.editar', id=pessoa.id) }}" method="post" class="form-card">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" value="{{ pessoa.nome }}" required>
        </div>
        <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" value="{{ pessoa.cpf }}" required>
        </div>
        <div class="form-group">
            <label for="idade">Idade</label>
            <input type="text" id="idade" name="idade" value="{{ pessoa.idade }}" required>
        </div>
        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" value="{{ pessoa.telefone }}">
        </div>
        <div class="form-actions">
            <a href="{{ url_for('pessoa_bp.listar') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Atualizar</button>
        </div>
    </form>
{% endblock %}
