{% extends "base.html" %}
{% block conteudo %}
    <h2>Editando: {{ pessoa.nome }}</h2>
    <form action="{{ url_for('pessoas_bp.atualizar', id=pessoa.id) }}" method="post" class="form-card">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" value="{{ pessoa.nome }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ pessoa.email }}" required>
        </div>
        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" value="{{ pessoa.telefone }}">
        </div>
        <div class="form-actions">
            <a href="{{ url_for('pessoas_bp.listar') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Atualizar</button>
        </div>
    </form>
{% endblock %}
